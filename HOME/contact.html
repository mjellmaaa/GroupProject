<!-- Hero -->


<section style="

background-image:

linear-gradient(
rgba(223,162,176,.7),
rgba(223,162,176,.7)
),

url('img/contact.png');


background-size:cover;
background-position:center;

height:45vh;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

color:white;

">



<div>


<h1 style="
font-size:40px;
letter-spacing:3px;
text-transform:uppercase;
margin-bottom:15px;
">

Contact Us

</h1>



<p style="
font-size:17px;
line-height:1.6;
">

Have questions? We would love to hear from you.

</p>


</div>


</section>








<!-- Contact Form -->


<section style="

padding:60px 20px;

display:flex;

justify-content:center;

">



<div style="

background:#f5c6d0;

padding:40px;

border-radius:15px;

width:400px;

text-align:center;

">





<h2 style="

color:#333;

letter-spacing:2px;

text-transform:uppercase;

margin-bottom:20px;

">

Get In Touch

</h2>






<input 
type="text"
placeholder="Your Name"

style="

width:90%;

padding:12px;

margin:10px;

border:none;

border-radius:8px;

">





<input 
type="email"
placeholder="Your Email"

style="

width:90%;

padding:12px;

margin:10px;

border:none;

border-radius:8px;

">





<textarea

placeholder="Your Message"

style="

width:90%;

height:100px;

padding:12px;

margin:10px;

border:none;

border-radius:8px;

">

</textarea>







<button

style="

background:#DFA2B0;

color:white;

border:none;

padding:12px 35px;

border-radius:20px;

cursor:pointer;

font-size:15px;

">


Send Message


</button>




</div>


</section>








<!-- Footer -->


<footer style="

background:#F4E6EA;

padding:25px;
